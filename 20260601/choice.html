<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>岩石小測驗</title>

<style>

body{
  margin:0;
  padding:40px 20px;
  background:#6f7f72;
  font-family:"Noto Sans TC", sans-serif;
  color:white;
  text-align:center;
}

h1{
  font-size:52px;
  margin-bottom:12px;
}

#quizBox{

  max-width:1000px;

  margin:auto;

  background:rgba(0,0,0,.28);

  padding:30px;

  border-radius:28px;

  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

#questionImage{

  width:100%;

  max-width:820px;

  border-radius:20px;

  margin-bottom:25px;

  box-shadow:0 8px 20px rgba(0,0,0,.3);
}

#question{

  font-size:34px;

  line-height:1.8;

  margin-bottom:30px;
}

.choice{

  display:block;

  width:100%;

  max-width:700px;

  margin:18px auto;

  padding:18px;

  font-size:24px;

  border:none;

  border-radius:18px;

  cursor:pointer;

  transition:.25s;

  background:white;

  color:#333;

  font-weight:bold;
}

.choice:hover{

  transform:scale(1.03);

  background:#ffe082;
}

#result{

  margin-top:30px;

  font-size:30px;

  font-weight:bold;

  min-height:90px;

  line-height:1.8;
}

#nextBtn{

  margin-top:25px;

  padding:16px 40px;

  font-size:24px;

  border:none;

  border-radius:18px;

  background:#ff9800;

  color:white;

  cursor:pointer;

  display:none;
}

#nextBtn:hover{

  background:#f57c00;
}

#back{

  display:inline-block;

  margin-top:35px;

  padding:14px 32px;

  background:#263238;

  color:white;

  text-decoration:none;

  border-radius:16px;

  font-size:22px;
}

</style>
</head>

<body>

<audio id="bgm" autoplay loop playsinline>

  <source src="bgm.mp3" type="audio/mpeg">

</audio>

<h1>岩石小測驗</h1>

<div id="quizBox">

  <img id="questionImage" src="card2.jpg">

  <div id="question"></div>

  <div id="choices"></div>

  <div id="result"></div>

  <button id="nextBtn" onclick="nextQuestion()">
    下一題
  </button>

</div>

<a id="back" href="finalexam.html">
返回地圖
</a>

<audio id="correctSound" src="V.mp3"></audio>

<audio id="wrongSound" src="X.mp3"></audio>

<script>

const bgm = document.getElementById("bgm");

bgm.volume = 0.5;


document.body.addEventListener("click", () => {

  bgm.play();

}, { once:true });



const quizData = [

{
  image:"card2.jpg",

  question:"1. 下列哪一項屬於變質岩？",

  choices:[
    "板岩",
    "玄武岩",
    "砂岩",
    "礫岩"
  ],

  answer:0,

  explanation:"板岩屬於變質岩，由頁岩受到高溫高壓後形成。"
},

{
  image:"card3.JPG",

  question:"2. 沉積岩主要是經由什麼作用形成？",

  choices:[
    "岩漿冷卻",
    "高溫高壓變質",
    "風化、搬運、沉積",
    "火山噴發"
  ],

  answer:2,

  explanation:"沉積岩是經由風化、搬運、沉積與石化作用形成。"
},

{
  image:"card4.JPG",

  question:"3. 下列哪一種屬於火成岩？",

  choices:[
    "石灰岩",
    "片岩",
    "板岩",
    "花崗岩"
  ],

  answer:3,

  explanation:"花崗岩屬於火成岩，由岩漿冷卻凝固形成。"
},

{
  image:"card2.jpg",

  question:"4. 變質岩形成的主要原因為何？",

  choices:[
    "生物遺骸堆積",
    "風化侵蝕",
    "高溫與高壓",
    "河川沉積"
  ],

  answer:2,

  explanation:"變質岩主要受到高溫與高壓作用後形成。"
},

{
  image:"card4.JPG",

  question:"5. 臺灣哪個地區較常見火成岩？",

  choices:[
    "西部平原",
    "中央山脈",
    "海岸山脈",
    "花東縱谷"
  ],

  answer:2,

  explanation:"台灣海岸山脈與北部大屯火山群較常見火成岩。"
}

];

let currentQuestion = 0;

function loadQuestion(){

  const q = quizData[currentQuestion];

  document.getElementById("questionImage").src = q.image;

  document.getElementById("question").innerHTML = q.question;

  document.getElementById("result").innerHTML = "";

  document.getElementById("nextBtn").style.display = "none";

  const choicesDiv = document.getElementById("choices");

  choicesDiv.innerHTML = "";

  q.choices.forEach((choice,index)=>{

    const btn = document.createElement("button");

    btn.className = "choice";

    btn.innerText = choice;

    btn.onclick = ()=>checkAnswer(index);

    choicesDiv.appendChild(btn);

  });
}

function checkAnswer(selected){

  const q = quizData[currentQuestion];

  const result = document.getElementById("result");

  if(selected === q.answer){

    document.getElementById("correctSound").play();

    result.innerHTML =
    "✔ 答對了！非常棒！<br>可以進入下一題。";

    result.style.color = "#8cff66";

    document.getElementById("nextBtn").style.display = "inline-block";

  }else{

    document.getElementById("wrongSound").play();

    result.innerHTML =
    "✘ 答錯了！<br>" +
    q.explanation +
    "<br><br>請再選一次。";

    result.style.color = "#ff8a80";

    document.getElementById("nextBtn").style.display = "none";
  }
}

function nextQuestion(){

  currentQuestion++;

  if(currentQuestion < quizData.length){

    loadQuestion();

  }else{

    document.getElementById("quizBox").innerHTML = `

      <h2 style="font-size:56px;">
      恭喜完成測驗！
      </h2>

      <p style="font-size:32px; line-height:2;">
      您已完成岩石分類小測驗。<br>
      已了解火成岩、沉積岩與變質岩的差異。
      </p>

      <a href="finalexam.html"
      style="
      display:inline-block;
      margin-top:25px;
      padding:18px 40px;
      background:#ff9800;
      color:white;
      text-decoration:none;
      border-radius:18px;
      font-size:26px;
      ">
      返回主頁
      </a>

    `;
  }
}

loadQuestion();

</script>
<script>

window.addEventListener("load", () => {

  const bgm = document.getElementById("bgm");

  bgm.volume = 0.5;

  const playPromise = bgm.play();

  if(playPromise !== undefined){

    playPromise.catch(() => {

      document.body.addEventListener("click", () => {
        bgm.play();
      }, { once:true });

    });

  }

});

</script>

</body>
</html>
