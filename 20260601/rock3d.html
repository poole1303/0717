<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 岩石互動</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:"Noto Sans TC", Arial, sans-serif;
}

#back{
  position:fixed;
  top:15px;
  left:15px;
  z-index:999;
  background:rgba(0,0,0,.75);
  color:white;
  padding:10px 14px;
  border-radius:10px;
  font-size:16px;
  text-decoration:none;
}

#hint{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:rgba(0,0,0,.7);
  color:white;
  padding:12px 18px;
  border-radius:14px;
  font-size:15px;
  text-align:center;
  line-height:1.7;
}

#bgmFrame{
  position:fixed;
  width:0;
  height:0;
  border:none;
  opacity:0;
  pointer-events:none;
}
</style>

<script>
AFRAME.registerComponent("hide-plane", {
  init:function(){
    this.el.addEventListener("model-loaded", () => {
      const object3D = this.el.getObject3D("mesh");

      if(object3D){
        object3D.traverse((node) => {
          if(
            node.name === "Plane" ||
            node.name.includes("Plane") ||
            node.material?.name === "Material.001"
          ){
            node.visible = false;
          }
        });
      }
    });
  }
});

AFRAME.registerComponent("stable-gesture", {
  init:function(){
    const model = this.el;

    let scale = 0.28;
    let rotationY = 0;
    let lastDistance = null;
    let lastAngle = null;
    let lastTapTime = 0;

    function distance(t1,t2){
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function angle(t1,t2){
      return Math.atan2(
        t2.clientY - t1.clientY,
        t2.clientX - t1.clientX
      );
    }

    window.addEventListener("touchstart", function(e){
      if(e.touches.length === 2){
        lastDistance = distance(e.touches[0], e.touches[1]);
        lastAngle = angle(e.touches[0], e.touches[1]);
      }

      if(e.touches.length === 1){
        const now = Date.now();

        if(now - lastTapTime < 350){
          scale = 0.28;
          rotationY = 0;

          model.setAttribute("scale", "0.28 0.28 0.28");
          model.setAttribute("rotation", "0 0 0");
        }

        lastTapTime = now;
      }
    }, {passive:false});

    window.addEventListener("touchmove", function(e){
      if(e.touches.length === 2){
        e.preventDefault();

        const newDistance = distance(e.touches[0], e.touches[1]);
        const newAngle = angle(e.touches[0], e.touches[1]);

        if(lastDistance){
          const change = newDistance / lastDistance;
          scale = scale * change;
          scale = Math.max(0.15, Math.min(0.75, scale));
          model.setAttribute("scale", `${scale} ${scale} ${scale}`);
        }

        if(lastAngle !== null){
          const angleChange = newAngle - lastAngle;
          rotationY += angleChange * 70;
          model.setAttribute("rotation", `0 ${rotationY} 0`);
        }

        lastDistance = newDistance;
        lastAngle = newAngle;
      }
    }, {passive:false});

    window.addEventListener("touchend", function(){
      lastDistance = null;
      lastAngle = null;
    });
  }
});
</script>
</head>

<body>

<iframe src="bgm.html" allow="autoplay" id="bgmFrame"></iframe>

<a id="back" href="finalexam.html">返回地圖</a>

<div id="hint">
請掃描 3D 岩石互動 圖片<br>
｜雙指拉合縮放｜<br>｜雙指旋轉｜<br>｜雙擊歸位｜
</div>

<a-scene
mindar-image="
  imageTargetSrc: ./interactive.mind;
  autoStart: true;
  uiLoading: true;
  uiError: true;
  uiScanning: true;
  filterMinCF: 0.001;
  filterBeta: 0.01;
"
color-space="sRGB"
renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-assets>
  <a-asset-item id="rockObj" src="./Rock1.obj"></a-asset-item>
  <a-asset-item id="rockMtl" src="./Rock1.mtl"></a-asset-item>
</a-assets>

<a-light
  type="ambient"
  color="#ffffff"
  intensity="3.8">
</a-light>

<a-light
  type="directional"
  color="#ffffff"
  intensity="3"
  position="2 3 2">
</a-light>

<a-light
  type="directional"
  color="#fff6dd"
  intensity="2"
  position="-2 2 1">
</a-light>

<a-light
  type="directional"
  color="#ffffff"
  intensity="1.5"
  position="0 1 3">
</a-light>

<a-camera look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-entity
  id="rockModel"

  obj-model="
    obj: #rockObj;
    mtl: #rockMtl
  "

  material="
    color:#ffffff;
    emissive:#444444;
    emissiveIntensity:0.35;
    roughness:0.7;
    metalness:0;
  "

  position="0 -0.1 0"

  rotation="0 0 0"

  scale="0.28 0.28 0.28"

  shadow="
    cast:true;
    receive:false
  "

  hide-plane
  stable-gesture>
</a-entity>

</a-entity>

</a-scene>

</body>
</html>
